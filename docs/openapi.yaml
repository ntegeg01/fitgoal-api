openapi: 3.0.3
info:
  title: FitGoal API
  version: 1.0.0
  description: REST API for FitGoal final project

servers:
  - url: https://fitgoal-api.onrender.com
    description: Production (Render)
  - url: http://localhost:8080
    description: Local development


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /:
    get:
      summary: Health check
      responses:
        "200":
          description: API is running

  /api/auth/signup:
    post:
      summary: Signup user
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: newuser@example.com
              name: New User
              password: Password123!
              role: USER
      responses:
        "201": { description: Created }
        "400": { description: Missing required fields }
        "409": { description: Email already in use }

  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: user@example.com
              password: Password123!
      responses:
        "200": { description: Returns JWT }
        "400": { description: Missing credentials }
        "401": { description: Invalid credentials }

  /api/goals:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create goal
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Lose 10 lbs
              description: Summer body goal
              targetDate: "2026-08-01T00:00:00.000Z"
              status: ACTIVE
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
    get:
      security: [{ bearerAuth: [] }]
      summary: List goals
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }

  /api/goals/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get goal by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    put:
      security: [{ bearerAuth: [] }]
      summary: Update goal
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Updated goal title
      responses:
        "200": { description: Updated }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    delete:
      security: [{ bearerAuth: [] }]
      summary: Delete goal
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /api/workouts:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create workout
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Leg Day
              category: Strength
              durationMin: 45
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
    get:
      security: [{ bearerAuth: [] }]
      summary: List workouts
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }

  /api/workouts/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get workout by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    put:
      security: [{ bearerAuth: [] }]
      summary: Update workout
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Updated workout
      responses:
        "200": { description: Updated }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    delete:
      security: [{ bearerAuth: [] }]
      summary: Delete workout
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /api/progress-logs:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create progress log
      requestBody:
        required: true
        content:
          application/json:
            example:
              goalId: 1
              value: 2.5
              note: Lost 2.5 lbs
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Goal not found }
    get:
      security: [{ bearerAuth: [] }]
      summary: List progress logs
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }

  /api/progress-logs/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get progress log by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    put:
      security: [{ bearerAuth: [] }]
      summary: Update progress log
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            example:
              value: 3
              note: Updated note
      responses:
        "200": { description: Updated }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    delete:
      security: [{ bearerAuth: [] }]
      summary: Delete progress log
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
